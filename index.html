<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>🌟 Ларіка v3 - English</title>

<!-- PWA META TAGS -->
<meta name="theme-color" content="#764ba2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ларіка">
<meta name="description" content="Освітня платформа: математика, англійська">

<!-- PWA MANIFEST -->
<link rel="manifest" href="manifest.json">

<!-- ICONS -->
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}

/* Auth */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:rgba(255,255,255,.98);padding:35px;border-radius:25px;box-shadow:0 10px 40px rgba(0,0,0,.4);max-width:420px;width:100%}
.auth-box h1{text-align:center;color:#764ba2;margin-bottom:25px;font-size:2.8rem}
.auth-box input{width:100%;padding:14px;margin:10px 0;border:2px solid #e0e0e0;border-radius:12px;font-size:1.05rem}
.auth-box button{width:100%;padding:15px;margin:12px 0;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1.15rem;font-weight:600;cursor:pointer}
.tab{display:flex;gap:10px;margin-bottom:25px}
.tab button{flex:1;padding:12px;background:#f5f5f5;border:none;border-radius:12px;cursor:pointer}
.tab button.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* Main */
#main{display:none;padding:15px;max-width:1200px;margin:0 auto}
.header{background:rgba(255,255,255,.98);padding:18px;border-radius:18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.stars{font-size:1.6rem;color:#ffd700;font-weight:700}
.btn{padding:11px 22px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:600}
.btn.danger{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btn.success{background:linear-gradient(135deg,#27ae60,#229954)}
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-bottom:20px}
.game-card{background:rgba(255,255,255,.98);padding:28px;border-radius:18px;text-align:center;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.2);transition:.3s}
.game-card:hover{transform:translateY(-5px)}
.game-card .emoji{font-size:3.5rem;display:block;margin-bottom:10px}
.game-card h2{color:#764ba2;font-size:2rem}

/* Dog */
.dog-area{background:rgba(255,255,255,.98);padding:20px;border-radius:18px;position:relative;min-height:350px;overflow:hidden}
.dog-house{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);width:130px;height:110px;background:linear-gradient(135deg,#8B4513,#A0522D);border-radius:15px 15px 0 0;cursor:pointer}
.dog-house::before{content:'🏠';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5rem}
.dog{position:absolute;bottom:25px;font-size:5rem;display:none;transition:left .6s ease,transform .3s}
.dog-hearts{position:absolute;top:15px;left:15px;font-size:1.3rem;background:rgba(255,255,255,.9);padding:8px 12px;border-radius:10px}
.dog-actions{position:absolute;top:15px;right:15px;display:none;flex-direction:column;gap:8px}
.dog-prop{position:absolute;font-size:3rem;pointer-events:none}
@keyframes throwRight{0%{left:50%;bottom:80%;opacity:1}100%{left:75%;bottom:25px;opacity:1}}
@keyframes throwLeft{0%{left:50%;bottom:80%;opacity:1}100%{left:18%;bottom:25px;opacity:1}}
@keyframes handPet{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes digAnim{0%,100%{transform:scaleX(1)}50%{transform:scaleX(-1) translateX(-10px)}}

/* English Monster Game */
#english-game{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e);z-index:3000;overflow:hidden;touch-action:none}
.en-back{position:absolute;top:10px;left:10px;z-index:100;background:#e74c3c;color:#fff;border:none;padding:10px 18px;border-radius:28px;cursor:pointer;font-size:1rem}
.en-hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:15px;color:#fff;display:flex;gap:14px;align-items:center;font-size:1rem;white-space:nowrap;z-index:10}
.en-monster{position:absolute;top:12%;left:50%;transform:translateX(-50%);text-align:center;font-size:5rem;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-15px)}}
.en-word{position:absolute;top:38%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);padding:14px 32px;border-radius:15px;color:#fff;font-size:2.5rem;text-align:center;white-space:nowrap}
.en-input-panel{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:92%;max-width:600px}
.en-input{width:100%;background:rgba(255,255,255,.95);border:3px solid #667eea;border-radius:15px;padding:14px;font-size:2rem;text-align:center}
.en-input.correct{border-color:#27ae60;background:#d4edda}
.en-input.wrong{border-color:#e74c3c;background:#f8d7da;animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
.en-feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.95);padding:30px 50px;border-radius:25px;color:#fff;text-align:center;z-index:9000;display:none}
.en-feedback.show{display:block;animation:fadeIn .3s}
.en-feedback h2{font-size:3rem;margin-bottom:15px}
.en-feedback.correct h2{color:#00ff88}
.en-feedback.wrong h2{color:#ff4444}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-50%) scale(.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* Dictionary */
#dictionary{display:none;padding:20px;max-width:900px;margin:0 auto}
.dict-word{background:rgba(255,255,255,.95);padding:15px 20px;border-radius:12px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.dict-progress{display:flex;gap:5px;margin-top:5px}
.dict-dot{width:12px;height:12px;border-radius:50%;background:#ddd}
.dict-dot.done{background:#27ae60}
.theme-select{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.theme-btn{padding:10px 20px;background:rgba(255,255,255,.9);border:2px solid #667eea;border-radius:10px;cursor:pointer}
.theme-btn.active{background:#667eea;color:#fff}

/* Victory */
#victory{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:5000;align-items:center;justify-content:center}
.victory-box{background:#fff;padding:50px;border-radius:25px;text-align:center;animation:bounce 1s}
.victory-box h1{font-size:4rem;color:#27ae60;margin-bottom:20px}
.victory-stars{font-size:8rem;margin:20px 0}
@keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0)}40%{transform:translateY(-30px)}60%{transform:translateY(-15px)}}

/* Math Game */
#math-game{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);z-index:3000;overflow:hidden;touch-action:none}
.math-back{position:absolute;top:10px;left:10px;z-index:100;background:#e74c3c;color:#fff;border:none;padding:10px 18px;border-radius:28px;cursor:pointer;font-size:1rem;font-weight:700}
.math-hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:15px;color:#fff;display:flex;gap:12px;align-items:center;font-size:1rem;white-space:nowrap;z-index:10}
.math-progress-bar{position:absolute;top:52px;left:50%;transform:translateX(-50%);width:80%;max-width:500px;height:10px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden}
.math-progress-fill{height:100%;background:linear-gradient(90deg,#00ff88,#00b4d8);border-radius:10px;transition:width .4s}
.math-monster{position:absolute;top:10%;left:50%;transform:translateX(-50%);text-align:center;font-size:5.5rem;transition:all .4s;animation:mfloat 2s ease-in-out infinite}
@keyframes mfloat{0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}50%{transform:translateX(-50%) translateY(-14px) rotate(3deg)}}
.math-monster.dead{animation:mdie .6s forwards!important}
@keyframes mdie{0%{transform:translateX(-50%) translateY(0) scale(1) rotate(0deg);opacity:1}30%{transform:translateX(-50%) translateY(-40px) scale(1.3) rotate(20deg);opacity:.9}100%{transform:translateX(-50%) translateY(80px) scale(0) rotate(180deg);opacity:0}}
.math-stars-burst{position:absolute;pointer-events:none;font-size:2.5rem;animation:burst .8s forwards}
@keyframes burst{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
.math-question{position:absolute;top:44%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);padding:18px 40px;border-radius:18px;color:#fff;font-size:3rem;font-weight:700;text-align:center;white-space:nowrap;border:2px solid rgba(255,255,255,.15)}
.math-input-panel{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:92%;max-width:500px;text-align:center}
.math-input{width:100%;background:rgba(255,255,255,.96);border:3px solid #667eea;border-radius:15px;padding:14px;font-size:2.5rem;text-align:center;font-weight:700}
.math-input.correct{border-color:#27ae60;background:#d4edda}
.math-input.wrong{border-color:#e74c3c;background:#f8d7da;animation:shake .5s}
.math-level-select{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;max-width:600px}
.math-level-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:16px 22px;margin:8px 0;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);border-radius:16px;color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;transition:.2s;backdrop-filter:blur(6px)}
.math-level-btn:hover{background:rgba(255,255,255,.22);transform:scale(1.02)}
.math-level-badge{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;padding:4px 12px;border-radius:20px;font-size:.95rem;font-weight:700}
.math-feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.96);padding:30px 50px;border-radius:25px;color:#fff;text-align:center;z-index:9000;display:none}
.math-feedback.show{display:block;animation:fadeIn .3s}
.math-feedback h2{font-size:3rem;margin-bottom:12px}
.math-feedback.correct h2{color:#00ff88}
.math-feedback.wrong h2{color:#ff4444}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
<div class="auth-box">
<h1>🌟 Ларіка</h1>
<div class="tab">
<button class="active" onclick="switchTab('login')">Вхід</button>
<button onclick="switchTab('register')">Реєстрація</button>
</div>
<div id="login-form">
<input type="text" id="login-username" placeholder="Ім'я">
<input type="text" id="login-password" placeholder="Пароль">
<button onclick="login()">Увійти</button>
</div>
<div id="register-form" class="hidden">
<input type="text" id="reg-username" placeholder="Ім'я">
<input type="text" id="reg-password" placeholder="Пароль">
<button onclick="register()">Створити</button>
</div>
</div>
</div>

<!-- MAIN -->
<div id="main">
<div class="header">
<div style="font-size:1.3rem;color:#764ba2;font-weight:700">👤 <span id="user-display"></span></div>
<div class="stars">⭐ <span id="stars-display">0</span></div>
<button class="btn" onclick="showDictionary()">📚 Словник</button>
<button class="btn" onclick="exportData()">💾 Експорт</button>
<button class="btn danger" onclick="logout()">Вийти</button>
</div>

<div class="games">
<div class="game-card" onclick="selectGame('math')">
<span class="emoji">💗</span>
<h2>Математика</h2>
<p>5 рівнів складності</p>
</div>
<div class="game-card" onclick="startEnglish()">
<span class="emoji">🇬🇧</span>
<h2>English</h2>
<p>Убивай монстрів словами!</p>
</div>
</div>

<div class="dog-area">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
<h3 style="color:#764ba2;margin:0">🐕 Моя собака</h3>
<button class="btn" onclick="renameDog()" style="padding:8px 16px;font-size:0.95rem">✏️ Змінити ім'я</button>
</div>
<div class="dog-hearts" id="dog-hearts"></div>
<div class="dog-house" onclick="tapDogHouse()">
<div id="dog-name-label" style="position:absolute;top:15px;left:50%;transform:translateX(-50%);background:rgba(139,69,19,0.95);color:#fff;padding:6px 18px;border-radius:12px;font-weight:700;font-size:1.2rem;text-shadow:2px 2px 4px rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.3)">Рекс</div>
</div>
<div class="dog" id="dog" style="left:50%;transform:translateX(-50%)">🐕</div>
<div class="dog-actions" id="dog-actions">
<button class="btn success" onclick="throwBone()">🦴 Кісточка -800⭐</button>
<button class="btn success" onclick="petDog()">✋ Погладити -800⭐</button>
<button class="btn success" onclick="throwBall()">⚽ М'ячик -800⭐</button>
</div>
<div id="poops-container"></div>
</div>
</div>

<!-- ENGLISH GAME -->
<div id="english-game">
<button class="en-back" onclick="closeEnglish()">← Назад</button>
<div class="en-hud">
<div id="en-hearts">❤️❤️❤️❤️❤️❤️❤️❤️</div>
<div>⭐ <span id="en-stars">0</span></div>
<div id="en-timer">60s</div>
</div>
<div id="en-theme-select" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
<h1 style="color:#fff;font-size:3rem;margin-bottom:30px">Обери тему</h1>
<div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center">
<button class="btn" style="padding:30px 40px;font-size:1.5rem" onclick="startEnglishTheme('verbs')">🏃 Дієслова</button>
<button class="btn" style="padding:30px 40px;font-size:1.5rem" onclick="startEnglishTheme('home')">🏠 Дім</button>
<button class="btn" style="padding:30px 40px;font-size:1.5rem" onclick="startEnglishTheme('nature')">🌳 Природа</button>
</div>
</div>
<div id="en-game-area" class="hidden">
<div class="en-word" id="en-word">word</div>
<div class="en-input-panel">
<input type="text" class="en-input" id="en-answer" placeholder="Напиши українською..." autocomplete="off">
<div style="display:flex;gap:10px;margin-top:12px">
<button id="en-replay-btn" onclick="replayCurrentWord()" style="flex:1;padding:14px;background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.5);border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;backdrop-filter:blur(4px)">🔊 Слухати</button>
<button onclick="checkEnglishAnswer()" style="flex:2;padding:14px;background:linear-gradient(135deg,#27ae60,#229954);color:#fff;border:none;border-radius:12px;font-size:1.2rem;font-weight:700;cursor:pointer">✅ Відповідь</button>
</div>
</div>
</div>
<div class="en-feedback" id="en-feedback">
<h2 id="fb-title">✅ Правильно!</h2>
<div id="fb-words" style="font-size:2rem;margin:20px 0"></div>
</div>
</div>

<!-- DICTIONARY -->
<div id="dictionary">
<div class="header">
<h2 style="color:#764ba2;margin:0">📚 Словник</h2>
<button class="btn" onclick="closeDictionary()">← Назад</button>
</div>
<div class="theme-select" id="dict-theme-filter">
<button class="theme-btn active" onclick="filterDictionary('all')">Всі</button>
<button class="theme-btn" onclick="filterDictionary('verbs')">Дієслова</button>
<button class="theme-btn" onclick="filterDictionary('home')">Дім</button>
<button class="theme-btn" onclick="filterDictionary('nature')">Природа</button>
</div>
<div style="margin:20px 0">
<input type="text" placeholder="English" id="dict-en" style="padding:10px;border-radius:8px;border:2px solid #ddd;margin-right:10px;width:200px">
<input type="text" placeholder="Переклад (через кому)" id="dict-uk" style="padding:10px;border-radius:8px;border:2px solid #ddd;margin-right:10px;width:220px">
<select id="dict-theme" style="padding:10px;border-radius:8px;border:2px solid #ddd;margin-right:10px">
<option value="verbs">Дієслова</option>
<option value="home">Дім</option>
<option value="nature">Природа</option>
</select>
<button class="btn success" onclick="addWord()">➕ Додати</button>
</div>
<div id="dict-list"></div>
</div>

<!-- MATH GAME -->
<div id="math-game">
<button class="math-back" onclick="closeMath()">← Назад</button>
<div class="math-hud">
<div id="math-hearts">❤️❤️❤️❤️❤️❤️❤️❤️</div>
<div>⭐ <span id="math-stars">0</span></div>
<div id="math-correct-count">0/20</div>
</div>
<div class="math-progress-bar"><div class="math-progress-fill" id="math-progress-fill" style="width:0%"></div></div>

<div id="math-level-select" class="math-level-select">
<h1 style="color:#fff;font-size:2.5rem;margin-bottom:25px">🔢 Обери рівень</h1>
<button class="math-level-btn" onclick="startMathLevel('A')">
  <span>🅰️ Рівень A — два числа 0–9</span>
  <span class="math-level-badge">+20⭐</span>
</button>
<button class="math-level-btn" onclick="startMathLevel('B')">
  <span>🅱️ Рівень B — три числа 0–9</span>
  <span class="math-level-badge">+30⭐</span>
</button>
<button class="math-level-btn" onclick="startMathLevel('C')">
  <span>🅲 Рівень C — 0–9 та 10–19</span>
  <span class="math-level-badge">+50⭐</span>
</button>
<button class="math-level-btn" onclick="startMathLevel('D')">
  <span>🅳 Рівень D — 10–99 та 10–99</span>
  <span class="math-level-badge">+70⭐</span>
</button>
<button class="math-level-btn" onclick="startMathLevel('E')">
  <span>🅴 Рівень E — 10–19 та 100–199</span>
  <span class="math-level-badge">+100⭐</span>
</button>
</div>

<div id="math-game-area" class="hidden">
<div class="math-question" id="math-question">5 + 3 = ?</div>
<div class="math-input-panel">
<input type="number" class="math-input" id="math-answer" placeholder="?" autocomplete="off" inputmode="numeric">
<button onclick="checkMathAnswer()" style="margin-top:12px;width:100%;padding:16px;background:linear-gradient(135deg,#27ae60,#229954);color:#fff;border:none;border-radius:15px;font-size:1.3rem;font-weight:700;cursor:pointer">✅ Відповідь</button>
</div>
</div>

<div class="math-feedback" id="math-feedback">
<h2 id="mfb-title">✅ Правильно!</h2>
<div id="mfb-detail" style="font-size:2rem;margin:15px 0"></div>
</div>
</div>

<!-- VICTORY -->
<div id="victory">
<div class="victory-box">
<h1>🎉 ПЕРЕМОГА!</h1>
<div class="victory-stars" id="victory-amount">+2000⭐</div>
<button class="btn" onclick="closeVictory()" style="font-size:1.5rem;padding:15px 40px">Продовжити</button>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════════════════════════
const USERS_KEY='larikaV3';
let currentUser=null;
let englishState=null;

// English words database - 3 themes × 30 words = 90 words
const EN_MONSTERS=['👾','👹','👺','🤖','👻','💀','🎃','👿','😈','🧟'];

const EN_WORDS={
verbs:[ // Дієслова
{en:'be',uk:'бути'},{en:'have',uk:'мати'},{en:'do',uk:'робити'},{en:'say',uk:'говорити'},{en:'go',uk:'йти'},
{en:'get',uk:'отримувати'},{en:'make',uk:'робити'},{en:'know',uk:'знати'},{en:'think',uk:'думати'},{en:'take',uk:'брати'},
{en:'see',uk:'бачити'},{en:'come',uk:'приходити'},{en:'want',uk:'хотіти'},{en:'use',uk:'використовувати'},{en:'find',uk:'знаходити'},
{en:'give',uk:'давати'},{en:'tell',uk:'розповідати'},{en:'work',uk:'працювати'},{en:'call',uk:'кликати'},{en:'try',uk:'намагатися'},
{en:'ask',uk:'питати'},{en:'need',uk:'потребувати'},{en:'feel',uk:'відчувати'},{en:'become',uk:'ставати'},{en:'leave',uk:'залишати'},

function updateDog(){
const user=getUser();
document.getElementById('dog-hearts').textContent='❤️'.repeat(Math.max(0,user.dog.hearts))+'🖤'.repeat(Math.max(0,10-user.dog.hearts));
const nameLabel=document.getElementById('dog-name-label');
if(nameLabel) nameLabel.textContent=user.dog.name||'Рекс';

// Init new fields if missing
if(!user.dog.lastPuddleAdd) user.dog.lastPuddleAdd=Date.now();
if(!user.dog.puddles) user.dog.puddles=[];

// Decay hearts every 3h
const hoursSince=(Date.now()-user.dog.lastHeartLoss)/3600000;
if(hoursSince>=3&&user.dog.hearts>0){
user.dog.hearts=Math.max(0,user.dog.hearts-Math.floor(hoursSince/3));
user.dog.lastHeartLoss=Date.now();
saveUser(user);
}

// Add puddle every 6h → -1 heart
const hoursSincePuddle=(Date.now()-user.dog.lastPuddleAdd)/3600000;
if(hoursSincePuddle>=6){
user.dog.puddles.push({x:15+r(70),y:35+r(30)});
user.dog.hearts=Math.max(0,user.dog.hearts-1);
user.dog.lastPuddleAdd=Date.now();
saveUser(user);
}

// Add poop every 12h → -1 heart
const hoursSincePoop=(Date.now()-user.dog.lastPoopAdd)/3600000;
if(hoursSincePoop>=12){
user.dog.poops.push({x:15+r(70),y:35+r(30)});
user.dog.hearts=Math.max(0,user.dog.hearts-1);
user.dog.lastPoopAdd=Date.now();
saveUser(user);
}

renderDogMess(user);
}

function startEnglishTheme(theme){
const user=getUser();
if(!user.english[theme]) user.english[theme]={};

// Get words with SRS
const words=EN_WORDS[theme].concat(user.customWords.filter(w=>w.theme===theme));
const wordProgress=words.map(w=>({
...w,
correct:user.english[theme][w.en]?.correct||0,
lastSeen:user.english[theme][w.en]?.lastSeen||0
}));

// Select 10 words for game
const selected=[];
const available=wordProgress.filter(w=>w.correct<3);
for(let i=0;i<10&&available.length>0;i++){
const idx=r(available.length);
selected.push(available[idx]);
available.splice(idx,1);
}

if(selected.length<10){
alert('Недостатньо слів! Додайте більше в словнику.');
return;
}

englishState={
theme,
words:selected,
current:0,
stars:0,
hearts:8,
correctCount:0,
queue:selected.map((w,i)=>i),
progress:{}
};

document.getElementById('en-theme-select').classList.add('hidden');
document.getElementById('en-game-area').classList.remove('hidden');
updateEnglishHUD();
nextEnglishWord();
}

function updateEnglishHUD(){
document.getElementById('en-hearts').textContent='❤️'.repeat(englishState.hearts)+'🖤'.repeat(10-englishState.hearts);
document.getElementById('en-stars').textContent=englishState.stars;
}

function nextEnglishWord(){
if(englishState.queue.length===0){
// Check if all words have 3 correct
const allDone=Object.values(englishState.progress).every(p=>p>=3);
if(allDone){
englishVictory();
return;
}

// Rebuild queue with words that need more practice
englishState.queue=englishState.words
.map((w,i)=>i)
.filter(i=>(englishState.progress[englishState.words[i].en]||0)<3);
}

const idx=englishState.queue.shift();
const word=englishState.words[idx];
englishState.currentWord=word;
englishState.currentIndex=idx;

// Display word and speak
document.getElementById('en-word').textContent=word.en;
document.getElementById('en-answer').value='';
document.getElementById('en-answer').classList.remove('correct','wrong');
document.getElementById('en-answer').focus();

speak(word.en,'en-US');

// Timer - 12 seconds per letter
const timeLimit=word.uk.length*12;
englishState.timeLeft=timeLimit;
englishState.timerInterval=setInterval(()=>{
englishState.timeLeft--;
document.getElementById('en-timer').textContent=englishState.timeLeft+'s';
if(englishState.timeLeft<=0){
clearInterval(englishState.timerInterval);
checkEnglishAnswer(true); // timeout
}
},1000);
}

function checkEnglishAnswer(timeout=false){
clearInterval(englishState.timerInterval);

const inp=document.getElementById('en-answer');
const answer=inp.value.trim().toLowerCase();
const correct=englishState.currentWord.uk.toLowerCase();
const allVariants=(englishState.currentWord.ukVariants||[englishState.currentWord.uk]).map(v=>v.toLowerCase());

// Normalize: remove apostrophe, ґ->г
const normalize=s=>s.replace(/['`´']/g,'').replace(/ґ/g,'г');

const isCorrect=allVariants.some(v=>normalize(answer)===normalize(v));

if(timeout){
// Timeout - wrong answer
showEnglishFeedback(false);
englishState.hearts--;
if(englishState.hearts<=0){
englishGameOver();
return;
}
} else if(isCorrect){
// Correct!
inp.classList.add('correct');
englishState.stars+=200;
englishState.correctCount++;

// Update progress
const en=englishState.currentWord.en;
if(!englishState.progress[en]) englishState.progress[en]=0;
englishState.progress[en]++;

// +1 heart every 5 correct
if(englishState.correctCount%5===0&&englishState.hearts<10){
englishState.hearts++;
}

// Save to user data
const user=getUser();
if(!user.english[englishState.theme]) user.english[englishState.theme]={};
if(!user.english[englishState.theme][en]) user.english[englishState.theme][en]={correct:0,lastSeen:0};
user.english[englishState.theme][en].correct++;
user.english[englishState.theme][en].lastSeen=Date.now();
saveUser(user);

showEnglishFeedback(true);

// If word needs more practice (< 3 correct), add back to queue after 5 words
if(englishState.progress[en]<3){
if(englishState.queue.length>=5){
englishState.queue.push(englishState.currentIndex);
} else {
// Less than 5 words left - add to end
englishState.queue.push(englishState.currentIndex);
}
}
} else {
// Wrong answer
inp.classList.add('wrong');
englishState.hearts--;
showEnglishFeedback(false);

if(englishState.hearts<=0){
englishGameOver();
return;
}

// Re-queue word
if(englishState.queue.length>=5){
englishState.queue.splice(5,0,englishState.currentIndex);
} else {
englishState.queue.push(englishState.currentIndex);
}
}

updateEnglishHUD();
}

function showEnglishFeedback(isCorrect){
const fb=document.getElementById('en-feedback');
const title=document.getElementById('fb-title');
const words=document.getElementById('fb-words');
const word=englishState.currentWord;

fb.className='en-feedback show '+(isCorrect?'correct':'wrong');
title.textContent=isCorrect?'✅ Правильно!':'❌ Неправильно';
const allV=(word.ukVariants&&word.ukVariants.length>1)?word.ukVariants.join(' / '):word.uk;
words.innerHTML=`<div style="color:${isCorrect?'#00ff88':'#ff4444'}">${allV}</div><div>${word.en}</div>`;

// Speak: ukrainian -> english
speak(word.uk,'uk-UA');
setTimeout(()=>speak(word.en,'en-US'),1500);

setTimeout(()=>{
fb.classList.remove('show');
if(englishState.hearts>0){
setTimeout(nextEnglishWord,500);
}
},3000);
}

if('speechSynthesis' in window){

utterance.lang=lang;
utterance.rate=0.9;
speechSynthesis.speak(utterance);
}
}

function renderDictionary(filterTheme){
const user=getUser();
const allWords=[];

// Add default words
for(const theme in EN_WORDS){
EN_WORDS[theme].forEach(w=>{
const progress=user.english[theme]&&user.english[theme][w.en]?user.english[theme][w.en].correct:0;
allWords.push({...w,theme,progress,custom:false});
});
}

// Add custom words
user.customWords.forEach(w=>{
const progress=user.english[w.theme]&&user.english[w.theme][w.en]?user.english[w.theme][w.en].correct:0;
allWords.push({...w,progress,custom:true});
});

// Filter
const filtered=filterTheme==='all'?allWords:allWords.filter(w=>w.theme===filterTheme);

const html=filtered.map((w,i)=>`
<div class="dict-word">
<div>
<div style="font-size:1.2rem;font-weight:600">${w.en} → ${w.uk}</div>
<div style="color:#666;font-size:0.9rem">Тема: ${w.theme} ${w.custom?'(власне)':''}</div>
<div class="dict-progress">
${[0,1,2].map(i=>`<div class="dict-dot ${w.progress>i?'done':''}"></div>`).join('')}
</div>
</div>
${w.custom?`<button class="btn danger" onclick="deleteWord(${i},'${filterTheme}')">🗑️</button>`:''}
</div>
`).join('');

document.getElementById('dict-list').innerHTML=html||'<p style="text-align:center;color:#999">Немає слів</p>';
}

function addWord(){
const enEl=document.getElementById('dict-en');
const ukEl=document.getElementById('dict-uk');
const en=(enEl?enEl.value:'').trim();
const uk=(ukEl?ukEl.value:'').trim();
const theme=document.getElementById('dict-theme').value;

if(!en||!uk)return alert('Заповніть обидва поля');

const user=getUser();
if(!user.customWords)user.customWords=[];

// Support multiple translations separated by comma
const ukVariants=uk.split(',').map(s=>s.trim()).filter(Boolean);
user.customWords.push({en,uk:ukVariants[0],ukVariants,theme});
saveUser(user);

enEl.value='';
ukEl.value='';

renderDictionary(document.querySelector('.theme-btn.active')?.dataset?.theme||'all');
alert('✅ Слово додано!');
}

function deleteWord(idx,filterTheme){
if(!confirm('Видалити це слово?'))return;
const user=getUser();
// Find custom word by real index
const customIdx=getRealCustomIndex(idx,filterTheme);
if(customIdx===-1)return;
user.customWords.splice(customIdx,1);
saveUser(user);
renderDictionary(filterTheme);
}

function editWord(idx,filterTheme){
const user=getUser();
const customIdx=getRealCustomIndex(idx,filterTheme);
if(customIdx===-1)return;
const w=user.customWords[customIdx];

const newEn=prompt('English слово:',w.en);
if(!newEn||!newEn.trim())return;
const allUk=(w.ukVariants||[w.uk]).join(', ');
const newUk=prompt('Переклад(и) українською (через кому):',allUk);
if(!newUk||!newUk.trim())return;

const ukVariants=newUk.split(',').map(s=>s.trim()).filter(Boolean);
user.customWords[customIdx]={...w,en:newEn.trim(),uk:ukVariants[0],ukVariants};
saveUser(user);
renderDictionary(filterTheme);
}

function getRealCustomIndex(displayIdx,filterTheme){
const user=getUser();
const allWords=[];
for(const theme in EN_WORDS){
EN_WORDS[theme].forEach(w=>allWords.push({...w,theme,custom:false}));
}
user.customWords.forEach((w,i)=>allWords.push({...w,custom:true,realIdx:i}));
const filtered=filterTheme==='all'?allWords:allWords.filter(w=>w.theme===filterTheme);
const customFiltered=filtered.filter(w=>w.custom);
// displayIdx is index among ALL filtered words that are custom
// We need to find which custom item it refers to
const customDisplayItems=filtered.map((w,i)=>({...w,displayIdx:i})).filter(w=>w.custom);
const target=customDisplayItems.find(w=>w.displayIdx===displayIdx);
return target?target.realIdx:-1;
}

function renderDictionary(filterTheme){
const user=getUser();
const allWords=[];

// Add default words
for(const theme in EN_WORDS){
EN_WORDS[theme].forEach(w=>{
const progress=user.english[theme]&&user.english[theme][w.en]?user.english[theme][w.en].correct:0;
allWords.push({...w,theme,progress,custom:false});
});
}

// Add custom words
user.customWords.forEach((w,realIdx)=>{
const progress=user.english[w.theme]&&user.english[w.theme][w.en]?user.english[w.theme][w.en].correct:0;
const variants=w.ukVariants||[w.uk];
allWords.push({...w,ukVariants:variants,progress,custom:true,realIdx});
});

// Filter
const filtered=filterTheme==='all'?allWords:allWords.filter(w=>w.theme===filterTheme);

// Update active theme button dataset
document.querySelectorAll('.theme-btn').forEach(b=>{
const t=b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
if(t)b.dataset.theme=t;
});

const html=filtered.map((w,i)=>{
const variants=(w.ukVariants&&w.ukVariants.length>1)?w.ukVariants.join(' / '):w.uk;
return `
<div class="dict-word">
<div style="flex:1">
<div style="font-size:1.2rem;font-weight:600">${w.en} → ${variants}</div>
<div style="color:#666;font-size:0.9rem">Тема: ${w.theme} ${w.custom?'(власне)':''}</div>
<div class="dict-progress">
${[0,1,2].map(j=>`<div class="dict-dot ${w.progress>j?'done':''}"></div>`).join('')}
</div>
</div>
${w.custom?`
<div style="display:flex;gap:8px">
<button class="btn" style="padding:8px 14px;font-size:0.9rem;background:linear-gradient(135deg,#f39c12,#e67e22)" onclick="editWord(${i},'${filterTheme}')">✏️</button>
<button class="btn danger" style="padding:8px 14px;font-size:0.9rem" onclick="deleteWord(${i},'${filterTheme}')">🗑️</button>
</div>`:''}
</div>
`;
}).join('');

document.getElementById('dict-list').innerHTML=html||'<p style="text-align:center;color:#999">Немає слів</p>';
}

// MATH GAME
// ═══════════════════════════════════════════════════════════
const MATH_MONSTERS=['👾','👹','👺','🤖','👻','💀','🎃','👿','😈','🧟'];

const MATH_LEVELS={
A:{name:'A',reward:20,gen:()=>{
  const a=r(10),b=r(10),op=rnd(['+','-']);
  if(op==='-'){const big=Math.max(a,b),small=Math.min(a,b);return{q:`${big} − ${small} = ?`,a:big-small};}
  return{q:`${a} + ${b} = ?`,a:a+b};
}},
B:{name:'B',reward:30,gen:()=>{
  let a=r(10),b=r(10),c=r(10);
  const o1=rnd(['+','-']),o2=rnd(['+','-']);
  let res=o1==='+'?a+b:a-b;
  res=o2==='+'?res+c:res-c;
  if(res<0)return MATH_LEVELS.B.gen();
  const q1=o1==='+'?`${a} + ${b}`:`${a} − ${b}`;
  const q2=o2==='+'?`+ ${c}`:`− ${c}`;
  return{q:`${q1} ${q2} = ?`,a:res};
}},
C:{name:'C',reward:50,gen:()=>{
  const a=r(10),b=r(10)+10,op=rnd(['+','-']);
  if(op==='-'){const big=Math.max(a,b),small=Math.min(a,b);return{q:`${big} − ${small} = ?`,a:big-small};}
  return{q:`${a} + ${b} = ?`,a:a+b};
}},
D:{name:'D',reward:70,gen:()=>{
  const a=r(90)+10,b=r(90)+10,op=rnd(['+','-']);
  if(op==='-'){const big=Math.max(a,b),small=Math.min(a,b);return{q:`${big} − ${small} = ?`,a:big-small};}
  return{q:`${a} + ${b} = ?`,a:a+b};
}},
E:{name:'E',reward:100,gen:()=>{
  const a=r(10)+10,b=r(100)+100,op=rnd(['+','-']);
  if(op==='-'){const big=Math.max(a,b),small=Math.min(a,b);return{q:`${big} − ${small} = ?`,a:big-small};}
  return{q:`${a} + ${b} = ?`,a:a+b};
}}
};

let mathState=null;

function selectGame(type){
if(type==='math'){
  document.getElementById('main').style.display='none';
  document.getElementById('math-game').style.display='block';
  document.getElementById('math-level-select').classList.remove('hidden');
  document.getElementById('math-game-area').classList.add('hidden');
}
}

function closeMath(){
document.getElementById('math-game').style.display='none';
document.getElementById('main').style.display='block';
if(mathState&&mathState.stars>0){
const user=getUser();
user.stars+=mathState.stars;
saveUser(user);
}
mathState=null;
updateUI();
}

function startMathLevel(level){
mathState={level,reward:MATH_LEVELS[level].reward,hearts:8,stars:0,correctCount:0,streak:0,totalGoal:20};
document.getElementById('math-level-select').classList.add('hidden');
document.getElementById('math-game-area').classList.remove('hidden');
updateMathHUD();
nextMathQuestion();
document.getElementById('math-answer').onkeypress=e=>{if(e.key==='Enter')checkMathAnswer();};
}

function updateMathHUD(){
document.getElementById('math-hearts').textContent='❤️'.repeat(mathState.hearts)+'🖤'.repeat(10-mathState.hearts);
document.getElementById('math-stars').textContent=mathState.stars;
document.getElementById('math-correct-count').textContent=`${mathState.correctCount}/${mathState.totalGoal}`;
document.getElementById('math-progress-fill').style.width=(mathState.correctCount/mathState.totalGoal*100)+'%';
}

function nextMathQuestion(){
const q=MATH_LEVELS[mathState.level].gen();
mathState.currentQ=q;
document.getElementById('math-question').textContent=q.q;
const inp=document.getElementById('math-answer');
inp.value='';
inp.className='math-input';
inp.focus();
}

function checkMathAnswer(){
const inp=document.getElementById('math-answer');
const val=inp.value.trim();
if(val==='')return;
const answer=parseInt(val,10);
const correct=mathState.currentQ.a;
const isCorrect=answer===correct;

if(isCorrect){
  inp.classList.add('correct');
  mathState.stars+=mathState.reward;
  mathState.correctCount++;
  mathState.streak++;
  if(mathState.streak%5===0&&mathState.hearts<10)mathState.hearts++;
  spawnStarsBurst();
  showMathFeedback(true,correct);
  updateMathHUD();
  if(mathState.correctCount>=mathState.totalGoal){setTimeout(()=>mathVictory(),1600);return;}
  setTimeout(()=>{hideMathFeedback();nextMathQuestion();},1500);
} else {
  inp.classList.add('wrong');
  mathState.hearts--;
  mathState.streak=0;
  showMathFeedback(false,correct);
  updateMathHUD();
  if(mathState.hearts<=0){setTimeout(()=>mathGameOver(),1600);return;}
  setTimeout(()=>{hideMathFeedback();nextMathQuestion();},2000);
}
}

function showMathFeedback(isCorrect,correctAnswer){
const fb=document.getElementById('math-feedback');
fb.className='math-feedback show '+(isCorrect?'correct':'wrong');
document.getElementById('mfb-title').textContent=isCorrect?'✅ Правильно!':'❌ Неправильно';
document.getElementById('mfb-detail').textContent=isCorrect?`+${mathState.reward}⭐`:`Відповідь: ${correctAnswer}`;
}

function hideMathFeedback(){
document.getElementById('math-feedback').className='math-feedback';
}

function spawnStarsBurst(){
const game=document.getElementById('math-game');
for(let i=0;i<3;i++){
  const b=document.createElement('div');
  b.className='math-stars-burst';
  b.textContent='⭐';
  b.style.left=(25+r(50))+'%';
  b.style.top=(25+r(25))+'%';
  b.style.animationDelay=(i*0.15)+'s';
  game.appendChild(b);
  setTimeout(()=>b.remove(),900);
}
}

function mathVictory(){
hideMathFeedback();
const bonus=mathState.reward*20;
const total=mathState.stars+bonus;
const user=getUser();
user.stars+=total;
saveUser(user);
updateUI();
document.getElementById('victory').querySelector('h1').textContent='🏆 ПЕРЕМОГА!';
document.getElementById('victory-amount').textContent=`+${total}⭐`;
document.getElementById('victory').style.display='flex';
}

function mathGameOver(){
hideMathFeedback();
const user=getUser();
user.stars+=mathState.stars;
saveUser(user);
alert(`💀 Гру завершено!\n\n⭐ Зароблено: ${mathState.stars}\n✅ Правильних: ${mathState.correctCount}/20`);
closeMath();
}
